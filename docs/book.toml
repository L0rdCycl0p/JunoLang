[book]
title = "The Juno Programming Language"
authors = ["L0rdCycl0p", "Juno Community"]
language = "en"
src = "src"

[build]
build-dir = "book"

[output.html]
default-theme = "ayu"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/L0rdCycl0p/JunoLang"
edit-url-template = "https://github.com/L0rdCycl0p/JunoLang/edit/main/docs/src/{path}"
site-url = "/JunoLang/"

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true