name: Check Build

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
permissions:
  contents: read

jobs:
  build:
    name: Check if the project builds
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install LLVM
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release software-properties-common
          wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          sudo add-apt-repository "deb http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-22 main"
          sudo apt-get update
          sudo apt-get install -y llvm-22 llvm-22-dev
      - name: Configure LLVM
        run: |
          echo "LLVM_SYS_221_PREFIX=/usr/lib/llvm-22" >> $GITHUB_ENV
      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check project
        run: cargo check --locked --verbose

      - name: Build project
        run: cargo build --locked --verbose
